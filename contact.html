<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>改善プラン依頼</title>

<style>
body{
font-family:sans-serif;
background:#f5f2eb;
padding:20px;
}
.box{
background:#fff;
padding:20px;
max-width:600px;
margin:auto;
border:1px solid #ccc;
}
input{
width:100%;
padding:10px;
margin-bottom:12px;
}
button{
padding:12px;
width:100%;
background:#2c3e50;
color:#fff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>改善プランのご依頼</h2>

<input id="name" placeholder="姓名（漢字）">
<input id="kana" placeholder="姓名（カナ）">
<input id="email" placeholder="メールアドレス">

<button onclick="send()">送信する</button>

</div>

<script>

function send(){

const name = document.getElementById("name").value;
const kana = document.getElementById("kana").value;
const email = document.getElementById("email").value;

if(!name || !kana || !email){
alert("全て入力してください");
return;
}

/* データ取得 */
const data = JSON.parse(localStorage.getItem("diagnosis") || {});

/* ===== STEP3（担当区分） ===== */
let rolesText = "【担当区分・時給】\n";

(data.roles || []).forEach(r=>{
rolesText += `${r.name || ""} / 時給${r.wage || 0}円\n`;
});

/* ===== STEP4（業務） ===== */
let tasksText = "\n【業務一覧】\n";
let totalCost = 0;

(data.tasks || []).forEach(t=>{
tasksText += `${t.name || ""} / ${t.type || ""} / ${t.role || ""} / ${t.count || 0}人 / ${t.freq || ""} / ${t.time || 0}分\n`;
totalCost += t.cost || 0;
});

/* ===== サマリー ===== */
let summary = `
会社名：${data.company || ""}

対象業務数：${(data.tasks || []).length}
年間コスト：${Math.round(totalCost)}円

${rolesText}
${tasksText}
`;

/* ===== 送信 ===== */
const formData = new FormData();

formData.append("entry.198663789", name);
formData.append("entry.1353516178", kana);
formData.append("entry.1124072099", email);
formData.append("entry.1269919873", summary);
formData.append("entry.2025165898", JSON.stringify(data));

fetch("https://docs.google.com/forms/d/e/1FAIpQLSeV4qoUfjArsbUs9B1R3U76Ii3xuwUGu7V_6qJbBgrey-Hlfw/formResponse", {
method: "POST",
mode: "no-cors",
body: formData
});

/* 完了画面 */
window.location.href = "complete.html";

}

</script>

</body>
</html>
