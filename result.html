<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断結果</title>

<style>
body{font-family:sans-serif;background:#f5f2eb;padding:20px;}
.section{background:#fff;padding:20px;margin-bottom:20px;border:1px solid #ccc;}
.hero{background:#222;color:#fff;padding:30px;text-align:center;}
.big{font-size:30px;color:#e63946;font-weight:bold;}
.form{display:none;background:#fff;padding:20px;border:2px solid #222;}
input,textarea{width:100%;margin:5px 0;padding:8px;}
button{padding:10px 20px;margin-top:10px;}
</style>
</head>

<body>

<div class="hero">
<h2>診断結果</h2>
<p class="big" id="total"></p>
<p id="future"></p>
</div>

<div class="section">
<h3>最大コスト業務</h3>
<p id="topTask"></p>
</div>

<div class="section">
<h3>経営への示唆</h3>
<p>
この問題は人ではなく「仕組み」です。<br>
30〜60%の削減余地があります。
</p>
</div>

<div class="section">
<button onclick="openForm()">無料で改善提案を受ける</button>
</div>

<div class="form" id="form">

<h3>無料相談フォーム</h3>

<input id="company" placeholder="会社名">
<input id="name" placeholder="担当者名">
<input id="mail" placeholder="メール">
<input id="phone" placeholder="電話（任意）">

<textarea id="message"></textarea>

<button onclick="submitForm()">送信</button>

</div>

<script>

const params=new URLSearchParams(location.search);

const total=parseFloat(params.get("total"))||0;
const top=params.get("top")||"";
const company=params.get("company")||"";

document.getElementById("total").innerText=
"年間 "+Math.round(total).toLocaleString()+" 円の損失";

document.getElementById("future").innerText=
"5年で "+Math.round(total*5).toLocaleString()+" 円";

document.getElementById("topTask").innerText=top;

document.getElementById("company").value=company;

document.getElementById("message").value=
"年間損失："+Math.round(total)+"円\n最大業務："+top+"\n改善提案希望";

function openForm(){
document.getElementById("form").style.display="block";
}

const FORM_URL="https://docs.google.com/forms/d/e/XXXX/formResponse";

const F_COMPANY="entry.111111";
const F_NAME="entry.222222";
const F_MAIL="entry.333333";
const F_PHONE="entry.444444";
const F_MSG="entry.555555";

function submitForm(){

const c=document.getElementById("company").value;
const n=document.getElementById("name").value;
const m=document.getElementById("mail").value;
const p=document.getElementById("phone").value;
const msg=document.getElementById("message").value;

if(!c||!n||!m){alert("必須項目入力");return;}

fetch(FORM_URL,{
method:"POST",
mode:"no-cors",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:
F_COMPANY+"="+encodeURIComponent(c)+"&"+
F_NAME+"="+encodeURIComponent(n)+"&"+
F_MAIL+"="+encodeURIComponent(m)+"&"+
F_PHONE+"="+encodeURIComponent(p)+"&"+
F_MSG+"="+encodeURIComponent(msg)
});

alert("送信しました");

}

</script>

</body>
</html>
