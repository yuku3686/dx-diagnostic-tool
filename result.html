<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>診断結果</title>

<style>
body{font-family:sans-serif;background:#f5f2eb;padding:20px;}
.box{background:#fff;padding:20px;border:1px solid #ccc;}
.item{margin-bottom:15px;}
.big{font-size:22px;font-weight:bold;}
</style>
</head>

<body>

<div class="box">

<h2>診断結果</h2>

<div id="company"></div>

<div class="item">
<div>年間業務コスト</div>
<div class="big" id="total"></div>
</div>

<div class="item">
<div>最もコストの高い業務</div>
<div class="big" id="top"></div>
</div>

<div class="item">
<div>削減可能コスト</div>
<div class="big" id="save"></div>
</div>

<div class="item">
<div>創出時間</div>
<div class="big" id="time"></div>
</div>

<hr>

<h3>業務一覧</h3>
<div id="list"></div>

</div>

<script>

const data = JSON.parse(localStorage.getItem("diagnosis") || "{}");

function yen(v){ return (v||0).toLocaleString()+"円"; }

document.getElementById("company").innerText = data.company || "";

document.getElementById("total").innerText = yen(data.total);

document.getElementById("top").innerText = data.topTask || "";

const min = data.total*0.3;
const max = data.total*0.5;

document.getElementById("save").innerText =
yen(min)+"〜"+yen(max);

const timeMin=(min/1500).toFixed(0);
const timeMax=(max/1500).toFixed(0);

document.getElementById("time").innerText =
timeMin+"〜"+timeMax+"時間/年";

/* 一覧 */
let html="";
data.tasks?.forEach(t=>{
html+=`
<div>
${t.name} / ${yen(t.cost)}
</div>
`;
});

document.getElementById("list").innerHTML=html;

</script>

</body>
</html>
