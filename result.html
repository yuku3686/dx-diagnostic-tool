<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>診断結果</title>

<style>
body{
font-family:sans-serif;
background:#f5f2eb;
padding:20px;
}

.box{
background:#fff;
padding:20px;
max-width:600px;
margin:auto;
border:1px solid #ccc;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.item{
margin-bottom:20px;
}

.label{
font-size:14px;
color:#555;
}

.value{
font-size:22px;
font-weight:bold;
}

.message{
margin-top:30px;
padding:15px;
background:#fafafa;
border:1px solid #ddd;
line-height:1.6;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#2c3e50;
color:#fff;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<div class="title">診断結果</div>

<div class="item">
<div class="label">対象業務数</div>
<div class="value" id="taskCount"></div>
</div>

<div class="item">
<div class="label">業務所要時間（年間）</div>
<div class="value" id="totalTime"></div>
</div>

<div class="item">
<div class="label">業務コスト（年間）</div>
<div class="value" id="totalCost"></div>
</div>

<div class="message" id="message"></div>

<a href="contact.html">
<button>改善プランを受け取る</button>
</a>

</div>

<script>

const data = JSON.parse(localStorage.getItem("diagnosis") || "{}");

const tasks = data.tasks || [];

let totalTime = 0;
let totalCost = 0;

/* 計算 */
tasks.forEach(t => {
totalTime += (t.freq * t.time / 60); // 年間時間
totalCost += t.cost;
});

/* 削減余地（30〜50%） */
const minSave = totalCost * 0.3;
const maxSave = totalCost * 0.5;

/* 表示 */
document.getElementById("taskCount").innerText = tasks.length + "件";

document.getElementById("totalTime").innerText =
Math.round(totalTime).toLocaleString() + "時間";

document.getElementById("totalCost").innerText =
Math.round(totalCost).toLocaleString() + "円";

/* メッセージ */
document.getElementById("message").innerText =
`年間${Math.round(totalCost).toLocaleString()}円の業務コストのうち、最大${Math.round(maxSave).toLocaleString()}円分は削減できる可能性があります。`;

</script>

</body>
</html>
