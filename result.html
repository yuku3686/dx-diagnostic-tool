<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>診断結果</title>

<style>
body{
font-family:sans-serif;
background:#f5f2eb;
padding:20px;
}

.container{
background:#fff;
padding:20px;
border:1px solid #ccc;
}

h2{
margin-bottom:10px;
}

.result-box{
background:#fafafa;
border:1px solid #ddd;
padding:15px;
margin-top:15px;
}

.big{
font-size:24px;
font-weight:bold;
margin:10px 0;
}

.highlight{
color:#c0392b;
font-weight:bold;
}

.sub{
color:#555;
font-size:14px;
}

.back-btn{
margin-top:20px;
padding:10px 20px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>診断結果</h2>

<div id="companyName"></div>

<div class="result-box">
<div class="sub">現在の業務コスト（年間）</div>
<div class="big" id="totalCost"></div>
</div>

<div class="result-box">
<div class="sub">最もコストのかかっている業務</div>
<div class="big" id="topTask"></div>
</div>

<div class="result-box">
<div class="sub">削減可能コスト（推定）</div>
<div class="big highlight" id="saving"></div>
<div class="sub">※業務効率化・IT化を行った場合の目安</div>
</div>

<div class="result-box">
<div class="sub">創出される時間</div>
<div class="big" id="timeSaved"></div>
</div>

<button class="back-btn" onclick="history.back()">戻る</button>

</div>

<script>

/* URLパラメータ取得 */
const params = new URLSearchParams(location.search);

const total = parseFloat(params.get("total") || 0);
const top = decodeURIComponent(params.get("top") || "未入力");
const company = decodeURIComponent(params.get("company") || "");
/* URLパラメータ取得 */
/*const params = new URLSearchParams(location.search);

const total = parseFloat(params.get("total") || 0);
const top = params.get("top") || "未入力";
const company = params.get("company") || "";
/*
/* 表示 */
document.getElementById("companyName").innerHTML =
company ? 会社名：${company} : "";

/* 数値フォーマット */
function yen(num){
return num.toLocaleString() + "円";
}

/* 計算ロジック */
const totalCost = total;

/* 改善余地（仮ロジック：30%〜50%削減可能） */
const minSave = totalCost * 0.3;
const maxSave = totalCost * 0.5;

/* 時間換算（時給1500円仮定） */
const avgWage = 1500;
const timeMin = (minSave / avgWage).toFixed(0);
const timeMax = (maxSave / avgWage).toFixed(0);

/* 描画 */
document.getElementById("totalCost").innerText = yen(totalCost);

document.getElementById("topTask").innerText = top;

document.getElementById("saving").innerText =
`${yen(minSave)} 〜 ${yen(maxSave)}`;

document.getElementById("timeSaved").innerText =
`${timeMin}時間 〜 ${timeMax}時間 / 年`;

</script>

</body>
</html>
