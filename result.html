<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>診断結果</title>

<style>
body{
font-family:sans-serif;
background:#f5f2eb;
padding:20px;
}

.box{
background:#fff;
padding:20px;
border:1px solid #ccc;
max-width:800px;
margin:auto;
}

.section{
margin-bottom:25px;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.big{
font-size:26px;
font-weight:bold;
margin:10px 0;
}

.danger{
color:#c0392b;
font-weight:bold;
}

.good{
color:#27ae60;
font-weight:bold;
}

.cta{
background:#2c3e50;
color:#fff;
padding:15px;
text-align:center;
cursor:pointer;
margin-top:20px;
}

.sub{
color:#555;
font-size:14px;
line-height:1.6;
}

.list{
background:#fafafa;
padding:10px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="box">

<h2>診断結果</h2>

<div id="company"></div>

<!-- ① 現状 -->
<div class="section">
<div class="title">① 現在の業務コスト</div>
<div class="big" id="total"></div>
<div class="sub">
日常業務の中で、これだけの人件費が使われています。
</div>
</div>

<!-- ② 問題提起 -->
<div class="section">
<div class="title">② 最もコストのかかっている業務</div>
<div class="big danger" id="top"></div>
<div class="sub">
この業務が、コスト構造のボトルネックになっている可能性があります。
</div>
</div>

<!-- ③ 改善余地 -->
<div class="section">
<div class="title">③ 改善余地</div>
<div class="big good" id="save"></div>
<div class="sub">
業務整理やIT化により削減できる可能性があります。
</div>
</div>

<!-- ④ 時間 -->
<div class="section">
<div class="title">④ 創出される時間</div>
<div class="big" id="time"></div>
<div class="sub">
本来やるべき業務（営業・改善）に使える時間です。
</div>
</div>

<!-- ⑤ 気づき -->
<div class="section">
<div class="title">⑤ この結果から言えること</div>
<div class="sub" id="insight"></div>
</div>

<!-- ⑥ 提案 -->
<div class="section">
<div class="title">⑥ 改善の方向性</div>
<div class="list" id="suggest"></div>
</div>

<!-- CTA -->
<div class="cta" onclick="alert('ここに問い合わせ導線を設置')">
無料で具体的な改善提案を受ける
</div>

</div>

<script>

const data = JSON.parse(localStorage.getItem("diagnosis") || "{}");

function yen(v){ return (v||0).toLocaleString()+"円"; }

document.getElementById("company").innerText = data.company || "";

document.getElementById("total").innerText = yen(data.total);

document.getElementById("top").innerText = data.topTask || "";

const min = data.total*0.3;
const max = data.total*0.5;

document.getElementById("save").innerText =
yen(min)+"〜"+yen(max);

const timeMin=(min/1500).toFixed(0);
const timeMax=(max/1500).toFixed(0);

document.getElementById("time").innerText =
timeMin+"〜"+timeMax+"時間/年";

/* 洞察 */
let insight="";
if(data.total > 1000000){
insight="業務コストが高く、構造的な見直し余地が大きい状態です。";
}else{
insight="現状は適正範囲ですが、一部業務に改善余地があります。";
}

document.getElementById("insight").innerText = insight;

/* 提案 */
let html="";

data.tasks?.forEach(t=>{
if(t.cost > data.total * 0.2){
html += `<div>・${t.name} → IT化または外注の優先候補</div>`;
}
});

if(html===""){
html="・一部業務の見直しで効率化余地があります";
}

document.getElementById("suggest").innerHTML = html;

</script>

</body>
</html>
