<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>業務損失 無料診断ツール</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>

:root{
--ink:#1a1a18;
--paper:#f5f2eb;
--accent:#c8401a;
--border:#d6d0c4;
--white:#ffffff;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Noto Sans JP',sans-serif;
background:var(--paper);
color:var(--ink);
padding:40px 20px;
}

.wrap{
max-width:900px;
margin:auto;
}

h1{
font-size:28px;
margin-bottom:10px;
font-weight:900;
}

p.desc{
margin-bottom:30px;
color:#555;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
background:white;
}

th{
background:var(--ink);
color:white;
font-size:12px;
padding:10px;
}

td{
border-bottom:1px solid var(--border);
padding:8px;
}

td input{
width:100%;
padding:6px;
}

.number{
text-align:right;
}

.calc{
text-align:right;
font-weight:bold;
color:var(--accent);
}

.total{
font-size:18px;
font-weight:900;
color:var(--accent);
}

button{
padding:10px 20px;
background:var(--ink);
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:var(--accent);
}

.add{
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>業務損失 無料診断ツール</h1>
<p class="desc">日々の業務の無駄時間を入力すると、年間の損失コストを自動計算します。</p>

<table id="taskTable">

<thead>
<tr>
<th>業務名</th>
<th>人数</th>
<th>時間/日（分）</th>
<th>時給</th>
<th>年間損失</th>
<th></th>
</tr>
</thead>

<tbody id="tbody">

<tr>
<td><input type="text" placeholder="例：手作業のデータ入力"></td>

<td>
<input type="number" value="1" class="people">
</td>

<td>
<input type="number" value="30" class="minutes">
</td>

<td>
<input type="number" value="1500" class="wage">
</td>

<td class="calc">0</td>

<td>
<button onclick="deleteRow(this)">×</button>
</td>

</tr>

</tbody>

</table>

<button class="add" onclick="addRow()">＋業務を追加</button>

<p class="total">
年間損失合計：  
<span id="totalCost">0</span> 円
</p>

</div>

<script>

function calculate(){

let rows=document.querySelectorAll("#tbody tr");

let total=0;

rows.forEach(row=>{

let people=row.querySelector(".people").value;
let minutes=row.querySelector(".minutes").value;
let wage=row.querySelector(".wage").value;

let cost=(people*minutes/60*wage*240);

row.querySelector(".calc").innerText=Math.round(cost).toLocaleString();

total+=cost;

});

document.getElementById("totalCost").innerText=Math.round(total).toLocaleString();

}

document.addEventListener("input",calculate);

function addRow(){

let tbody=document.getElementById("tbody");

let row=document.createElement("tr");

row.innerHTML=`
<td><input type="text"></td>
<td><input type="number" value="1" class="people"></td>
<td><input type="number" value="30" class="minutes"></td>
<td><input type="number" value="1500" class="wage"></td>
<td class="calc">0</td>
<td><button onclick="deleteRow(this)">×</button></td>
`;

tbody.appendChild(row);

}

function deleteRow(btn){

btn.closest("tr").remove();

calculate();

}

calculate();

</script>

</body>
</html>
