<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>業務損失診断ツール</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Noto Sans JP',sans-serif;
background:#f5f2eb;
padding:40px;
color:#1a1a18;
}

.wrap{
max-width:1000px;
margin:auto;
}

h1{
font-size:28px;
margin-bottom:20px;
}

h2{
margin-top:40px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-bottom:20px;
}

th{
background:#1a1a18;
color:white;
font-size:12px;
padding:8px;
}

td{
border-bottom:1px solid #ddd;
padding:6px;
}

input,select{
width:100%;
padding:6px;
}

button{
padding:10px 18px;
border:none;
background:#1a1a18;
color:white;
cursor:pointer;
}

button:hover{
background:#c8401a;
}

.calc{
font-weight:bold;
color:#c8401a;
text-align:right;
}

.total{
font-size:22px;
font-weight:900;
color:#c8401a;
}

.center{
text-align:center;
margin-top:30px;
}

.result{
display:none;
margin-top:40px;
padding:20px;
background:white;
border:2px solid #1a1a18;
}

</style>

</head>

<body>

<div class="wrap">

<h1>業務損失診断ツール</h1>

<h2>STEP01 会社名（必須）</h2>
<input id="company">

<h2>STEP02 部署名（任意）</h2>
<input id="dept">

<h2>STEP03 役職と時給</h2>

<table>

<thead>
<tr>
<th>役職</th>
<th>時給</th>
<th></th>
</tr>
</thead>

<tbody id="roleBody">

<tr>
<td><input class="role"></td>
<td><input type="number" class="wage"></td>
<td><button onclick="deleteRow(this)">×</button></td>
</tr>

</tbody>

</table>

<button onclick="addRole()">役職追加</button>

<h2>STEP04 業務入力</h2>

<table>

<thead>
<tr>
<th>業務名</th>
<th>業務種類</th>
<th>役職</th>
<th>人数</th>
<th>頻度</th>
<th>作業時間(分)</th>
<th>年間コスト</th>
<th></th>
</tr>
</thead>

<tbody id="taskBody">

<tr>

<td><input></td>

<td>
<select>
<option>事務</option>
<option>営業</option>
<option>管理</option>
<option>製造</option>
</select>
</td>

<td>
<select class="roleSelect"></select>
</td>

<td>
<input type="number" value="1" class="people">
</td>

<td>
<select class="freq">
<option value="240">毎日</option>
<option value="52">週1</option>
<option value="12">月1</option>
<option value="1">年1</option>
</select>
</td>

<td>
<input type="number" value="10" class="time">
</td>

<td class="calc">0</td>

<td>
<button onclick="deleteRow(this)">×</button>
</td>

</tr>

</tbody>

</table>

<button onclick="addTask()">業務追加</button>

<div class="center">
<button onclick="showResult()">診断結果を見る</button>
</div>

<div class="result" id="resultBox">

<h2>診断結果</h2>

<p class="total">
年間業務損失：  
<span id="totalCost">0</span> 円
</p>

</div>

</div>

<script>

function updateRoleOptions(){

let roles=document.querySelectorAll(".role");
let selects=document.querySelectorAll(".roleSelect");

selects.forEach(sel=>{

let current=sel.value;

sel.innerHTML="";

roles.forEach((r,i)=>{

let name=r.value || "役職"+(i+1);

let option=document.createElement("option");

option.value=i;
option.text=name;

sel.appendChild(option);

});

if(current) sel.value=current;

});

}

function calculate(){

let rows=document.querySelectorAll("#taskBody tr");

let total=0;

rows.forEach(row=>{

let roleIndex=row.querySelector(".roleSelect").value;

let wage=document.querySelectorAll(".wage")[roleIndex]?.value;

let people=row.querySelector(".people").value;

let freq=row.querySelector(".freq").value;

let time=row.querySelector(".time").value;

if(!wage)return;

let cost=wage*people*(time/60)*freq;

row.querySelector(".calc").innerText=Math.round(cost).toLocaleString();

total+=cost;

});

document.getElementById("totalCost").innerText=Math.round(total).toLocaleString();

}

function addRole(){

let row=document.createElement("tr");

row.innerHTML=`
<td><input class="role"></td>
<td><input type="number" class="wage"></td>
<td><button onclick="deleteRow(this)">×</button></td>
`;

document.getElementById("roleBody").appendChild(row);

updateRoleOptions();

}

function addTask(){

let row=document.createElement("tr");

row.innerHTML=`
<td><input></td>
<td>
<select>
<option>事務</option>
<option>営業</option>
<option>管理</option>
<option>製造</option>
</select>
</td>
<td><select class="roleSelect"></select></td>
<td><input type="number" value="1" class="people"></td>
<td>
<select class="freq">
<option value="240">毎日</option>
<option value="52">週1</option>
<option value="12">月1</option>
<option value="1">年1</option>
</select>
</td>
<td><input type="number" value="10" class="time"></td>
<td class="calc">0</td>
<td><button onclick="deleteRow(this)">×</button></td>
`;

document.getElementById("taskBody").appendChild(row);

updateRoleOptions();

}

function deleteRow(btn){

btn.closest("tr").remove();

updateRoleOptions();
calculate();

}

function showResult(){

calculate();

document.getElementById("resultBox").style.display="block";

document.getElementById("resultBox").scrollIntoView({
behavior:"smooth"
});

}

document.addEventListener("input",()=>{

updateRoleOptions();
calculate();

});

updateRoleOptions();

</script>

</body>

</html>
