<div class="section">
<h3>STEP04 業務入力</h3>

<div id="tasks"></div>

<button onclick="addTask()">業務追加</button>
</div>

<style>

.task-row{
display:grid;
grid-template-columns: 1.5fr 1.5fr 1fr 0.7fr 0.7fr 1fr;
gap:8px;
margin-bottom:10px;
background:#fafafa;
padding:10px;
border:1px solid #ddd;
align-items:center;
}

.task-row input,
.task-row select{
width:100%;
padding:6px;
}

.task-header{
display:grid;
grid-template-columns: 1.5fr 1.5fr 1fr 0.7fr 0.7fr 1fr;
gap:8px;
font-weight:bold;
margin-bottom:5px;
}

</style>

<script>

// ヘッダー追加（最初に1回だけ）
if(!document.getElementById("taskHeader")){
const header=document.createElement("div");
header.className="task-header";
header.id="taskHeader";
header.innerHTML=`
<div>業務名</div>
<div>種類</div>
<div>役職</div>
<div>人数</div>
<div>頻度/月</div>
<div>時間(分)</div>
`;
document.getElementById("tasks").before(header);
}

function addTask(){

document.getElementById("tasks").insertAdjacentHTML("beforeend",`
<div class="task-row">

<input class="taskName" placeholder="例：請求書作成">
<input class="taskType" placeholder="例：事務作業">

<select class="taskRole"></select>

<input class="taskPeople" type="number" placeholder="1">
<input class="taskFreq" type="number" placeholder="20">
<input class="taskTime" type="number" placeholder="30">

</div>
`);

updateTaskRoles();
}

</script>
